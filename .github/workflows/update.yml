name: Update Dashboard Stats

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 08:00 SAST — after meeting extractor
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate stats.json
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
        run: python generate_stats.py

      - name: Commit and push if stats changed
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add stats.json
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "chore: update stats $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
            git push
          )
